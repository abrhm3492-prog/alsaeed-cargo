<!DOCTYPE html>
<html lang="ar">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ExCoreX Demo</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(180deg,#0b1220,#0e1b35);
color:white;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.container{
width:360px;
background:#111c33;
padding:30px;
border-radius:12px;
box-shadow:0 0 20px rgba(0,0,0,0.5);
}

.logo{
text-align:center;
font-size:28px;
font-weight:bold;
margin-bottom:10px;
}

.logo span{
color:#3ea6ff;
}

.subtitle{
text-align:center;
margin-bottom:20px;
color:#9fb3d9;
font-size:14px;
}

input{
width:100%;
padding:12px;
margin-top:10px;
border-radius:8px;
border:none;
background:#1d2a45;
color:white;
font-size:14px;
}

input::placeholder{
color:#8aa0c8;
}

button{
width:100%;
margin-top:15px;
padding:12px;
border:none;
border-radius:8px;
background:#2f80ed;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#1c6ed5;
}

.captcha{
display:flex;
justify-content:space-between;
align-items:center;
margin-top:10px;
}

.code{
background:white;
color:black;
padding:6px 12px;
font-weight:bold;
border-radius:4px;
}

</style>

</head>

<body>

<div class="container">

<div class="logo">
Ex<span>CoreX</span>
</div>

<div class="subtitle">
تداول العملات المشفرة في أي وقت
</div>

<form>

<input type="email" placeholder="البريد الإلكتروني">

<input type="password" placeholder="كلمة المرور">

<div class="captcha">

<input type="text" placeholder="ادخل كود التحقق">

<div class="code">BRGN</div>

</div>

<button type="submit">
تسجيل الدخول
</button>

</form>

</div>

</body>

</html>
