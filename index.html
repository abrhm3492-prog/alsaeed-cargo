<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crypto Demo Exchange</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f0f14;
color:white;
}

.header{
background:#0d1b2a;
padding:20px;
text-align:center;
font-size:24px;
font-weight:bold;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.card{
background:#1b263b;
padding:20px;
border-radius:10px;
margin-bottom:20px;
}

button{
background:#1e90ff;
border:none;
padding:10px 20px;
color:white;
border-radius:6px;
cursor:pointer;
}

input{
padding:10px;
width:100%;
margin-top:10px;
margin-bottom:10px;
border-radius:6px;
border:none;
}

.balance{
font-size:22px;
margin-bottom:10px;
}

.coin{
display:flex;
justify-content:space-between;
padding:10px;
background:#243447;
margin-top:10px;
border-radius:6px;
}

</style>

</head>

<body>

<div class="header">
Crypto Demo Exchange
</div>

<div class="container">

<div class="card">
<h3>Login</h3>

<input id="user" placeholder="Username">

<button onclick="login()">Login</button>

</div>

<div id="dashboard" style="display:none">

<div class="card">

<div class="balance">
Balance: $<span id="balance">1000</span>
</div>

</div>

<div class="card">

<h3>Buy Crypto</h3>

<div class="coin">
<span>Bitcoin</span>
<span>$<span id="btc">65000</span></span>
<button onclick="buy('btc')">Buy</button>
</div>

<div class="coin">
<span>Ethereum</span>
<span>$<span id="eth">3000</span></span>
<button onclick="buy('eth')">Buy</button>
</div>

</div>

<div class="card">

<h3>Your Portfolio</h3>

Bitcoin: <span id="btcAmount">0</span><br><br>
Ethereum: <span id="ethAmount">0</span>

</div>

</div>

</div>

<script>

let balance = 1000
let btc = 0
let eth = 0

function login(){

let u = document.getElementById("user").value

if(u.length > 0){

document.getElementById("dashboard").style.display="block"

}

}

function buy(type){

if(type==="btc"){

let price = 65000

if(balance>=100){

balance -=100
btc += 100/price

}

}

if(type==="eth"){

let price = 3000

if(balance>=100){

balance -=100
eth += 100/price

}

}

update()

}

function update(){

document.getElementById("balance").innerText = balance.toFixed(2)

document.getElementById("btcAmount").innerText = btc.toFixed(6)

document.getElementById("ethAmount").innerText = eth.toFixed(6)

}

</script>

</body>
</html>
